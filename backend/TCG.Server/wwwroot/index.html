<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG - Play</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>TCG</h1>
    </header>

    <div id="auth" class="panel">
      <p id="authStatus" class="auth-status" role="status" aria-live="polite"></p>
      <h2>Sign In</h2>
      <div class="form-group">
        <label for="authEmail">Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="authPassword">Password</label>
        <input type="password" id="authPassword" placeholder="••••••••">
      </div>
      <button id="signIn">Sign In</button>
      <hr>
      <h2>Sign Up</h2>
      <div class="form-group">
        <label for="signUpName">Name</label>
        <input type="text" id="signUpName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="signUpEmail">Email</label>
        <input type="email" id="signUpEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="signUpPassword">Password</label>
        <input type="password" id="signUpPassword" placeholder="••••••••">
      </div>
      <button id="signUp">Sign Up</button>
    </div>
    <div id="lobby" class="panel" style="display:none">
      <div id="profileDisplay" class="profile-bar"></div>
      <button id="signOut" class="small-btn">Sign Out</button>
      <div class="form-group" id="deckSection">
        <label for="deckSelect">Deck</label>
        <select id="deckSelect"></select>
        <button id="findMatch">Find Match</button>
      </div>
      <p id="status"></p>
    </div>

    <div id="game" class="panel" style="display:none">
      <div id="gameStatus"></div>
      <div id="opponentArea" class="player-area">
        <h3>Opponent <span id="oppLife">20</span> HP <button id="attackFace" class="small-btn" style="display:none">Attack Face</button></h3>
        <div id="oppBoard" class="board"></div>
      </div>
      <div id="myArea" class="player-area">
        <h3>You <span id="myLife">20</span> HP</h3>
        <div id="myBoard" class="board"></div>
        <div id="myHand" class="hand"></div>
        <div id="gameActions">
          <button id="endTurn">End Turn</button>
        </div>
      </div>
    </div>

    <div id="gameOver" class="panel" style="display:none">
      <h2 id="gameOverText"></h2>
      <button id="backToLobby">Back to Lobby</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
